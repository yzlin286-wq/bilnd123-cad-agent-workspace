name: bilnd123-cad-agent-workspace

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cad_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cad_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cad_agent} -d ${POSTGRES_DB:-cad_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cad-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tencent.com/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tencent.com/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    command: sh -c "npm run db:migrate && npm run start"
    environment:
      NODE_ENV: production
      CAD_AGENT_BASE_URL: ${CAD_AGENT_BASE_URL:?set CAD_AGENT_BASE_URL}
      CAD_AGENT_API_KEY: ${CAD_AGENT_API_KEY:?set CAD_AGENT_API_KEY}
      CAD_AGENT_PRIMARY_MODEL: ${CAD_AGENT_PRIMARY_MODEL:?set CAD_AGENT_PRIMARY_MODEL}
      CAD_AGENT_DOWNGRADE_MODEL: ${CAD_AGENT_DOWNGRADE_MODEL:-}
      CAD_RUNNER_COMMAND: ${CAD_RUNNER_COMMAND:-/app/.venv/bin/python scripts/run_build123d.py}
      CAD_RUNNER_TIMEOUT_MS: ${CAD_RUNNER_TIMEOUT_MS:-60000}
      CAD_MAX_CONCURRENT_RUNS: ${CAD_MAX_CONCURRENT_RUNS:-1}
      MAX_PROMPT_CHARS: ${MAX_PROMPT_CHARS:-2000}
      CAD_OUTPUT_RETENTION_HOURS: ${CAD_OUTPUT_RETENTION_HOURS:-72}
      CAD_OUTPUT_MAX_BYTES: ${CAD_OUTPUT_MAX_BYTES:-1073741824}
      STAGING_BASIC_AUTH_USER: ${STAGING_BASIC_AUTH_USER:?set STAGING_BASIC_AUTH_USER}
      STAGING_BASIC_AUTH_PASSWORD: ${STAGING_BASIC_AUTH_PASSWORD:?set STAGING_BASIC_AUTH_PASSWORD}
      STAGING_ACCESS_MODE: ${STAGING_ACCESS_MODE:-https}
      STAGING_DOMAIN: ${STAGING_DOMAIN:-}
      STAGING_HTTPS_ENABLED: ${STAGING_HTTPS_ENABLED:-1}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?set CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      SAAS_ADMIN_USER_IDS: ${SAAS_ADMIN_USER_IDS:-}
      SAAS_ADMIN_EMAILS: ${SAAS_ADMIN_EMAILS:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://cad_agent:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/cad_agent}
      DATABASE_SSL: ${DATABASE_SSL:-0}
      SAAS_DEV_AUTH_BYPASS: ${SAAS_DEV_AUTH_BYPASS:-0}
      SAAS_DEV_USER_ID: ${SAAS_DEV_USER_ID:-internal-staging-user}
      SAAS_DEV_ORG_ID: ${SAAS_DEV_ORG_ID:-internal-staging}
      SAAS_DEV_ADMIN: ${SAAS_DEV_ADMIN:-0}
    volumes:
      - cad_outputs:/app/outputs/cad
      - run_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health',{headers:{Authorization:'Basic '+Buffer.from(process.env.STAGING_BASIC_AUTH_USER+':'+process.env.STAGING_BASIC_AUTH_PASSWORD).toString('base64')}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      cad-agent:
        condition: service_healthy
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN:?set STAGING_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  cad_outputs:
  run_logs:
  caddy_data:
  caddy_config:
  postgres_data:
