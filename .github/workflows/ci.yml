name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  python-runner-smoke:
    name: Python build123d runner smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run CAD runner smoke test
        run: |
          echo '{"spec":{"length":120,"width":80,"thickness":4,"holeDiameter":4.5,"edgeOffset":10,"chamfer":1}}' | python scripts/run_build123d.py | tee runner-output.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("runner-output.json").read_text())
          assert payload["ok"], payload
          validation_path = Path(payload["artifacts"]["validation"])
          validation = json.loads(validation_path.read_text())
          assert validation["passed"], validation
          assert Path(payload["artifacts"]["step"]).stat().st_size > 0
          assert Path(payload["artifacts"]["stl"]).stat().st_size > 0
          PY
